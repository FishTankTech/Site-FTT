<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>FishTankTech — Business Card — Fisher Armstrong</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:        #f4f7f8;
    --bg2:       #eaf1f2;
    --ink:       #0d1a20;
    --ink-dim:   rgba(13,26,32,0.62);
    --cyan:      #007e8f;
    --cyan-dim:  #4a959f;
    --cyan-glow: rgba(0, 126, 143, 0.10);
    --rule:      rgba(0,126,143,0.4);
    --mono: 'JetBrains Mono', 'Space Mono', monospace;
  }

  *{ box-sizing: border-box; }

  body{
    margin: 0;
    padding: 40px;
    background: #d9d9d9;
    display: flex;
    flex-wrap: wrap;
    gap: 40px;
    align-items: flex-start;
    font-family: var(--mono);
  }

  .card{
    width: 3.5in;
    height: 2in;
    background: var(--bg);
    color: var(--ink);
    position: relative;
    overflow: hidden;
    padding: 0.2in 0.24in;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    box-shadow: 0 10px 28px rgba(0,0,0,0.18);
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  /* subtle grid + noise, matching site texture */
  .card::before{
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,126,143,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,126,143,0.06) 1px, transparent 1px);
    background-size: 14px 14px;
    mask-image: radial-gradient(ellipse 90% 90% at 70% 20%, black 20%, transparent 90%);
    pointer-events: none;
    z-index: 0;
  }
  .card::after{
    content:"";
    position:absolute;
    inset:0;
    opacity:0.35;
    pointer-events:none;
    z-index: 0;
    background-image: url("data:image/svg+xml;utf8,\
<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'>\
<filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter>\
<rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/></svg>");
  }

  /* signature element: oversized watermark bracket, standing in for the
     [ ] motif used in the site nav-brand */
  .amp-mark{
    position: absolute;
    right: -0.22in;
    top: -0.42in;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 2.7in;
    line-height: 1;
    color: var(--cyan);
    opacity: 0.07;
    z-index: 0;
    pointer-events: none;
    user-select: none;
  }

  /* double-rule frame, cyan instead of ink */
  .frame{
    position: absolute;
    inset: 0.09in;
    border: 1px solid var(--cyan-dim);
    opacity: 0.7;
    z-index: 0;
    pointer-events: none;
  }
  .frame::after{
    content: "";
    position: absolute;
    inset: 3px;
    border: 1px solid var(--cyan-dim);
    opacity: 0.5;
  }

  .top{
    position: relative;
    z-index: 1;
  }

  .eyebrow{
    font-weight: 500;
    font-size: 7px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--cyan-dim);
    margin-bottom: 5px;
  }
  .eyebrow::before{ content: "// "; color: rgba(0,212,232,0.5); }

  .brand{
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.04em;
    color: var(--ink);
  }
  .brand .bracket{
    color: var(--cyan-dim);
  }
  .brand .accent{
    color: var(--cyan);
    text-shadow: 0 0 12px var(--cyan-glow);
  }

  .name{
    margin-top: 14px;
    font-weight: 700;
    font-size: 20px;
    color: var(--ink);
    line-height: 1.1;
  }

  .role{
    margin-top: 5px;
    font-weight: 500;
    font-size: 8px;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    color: var(--cyan-dim);
  }

  .bottom{
    position: relative;
    z-index: 1;
  }

  .rule{
    height: 1px;
    background: var(--rule);
    opacity: 0.5;
    margin-bottom: 8px;
  }

  .bottom-row{
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 12px;
  }

  .tagline{
    font-weight: 500;
    font-size: 9.5px;
    line-height: 1.4;
    color: var(--ink-dim);
    max-width: 1.6in;
  }
  .tagline::before{ content: "> "; color: var(--cyan-dim); }

  .contact{
    text-align: right;
    font-size: 8px;
    line-height: 1.7;
    color: var(--ink-dim);
    white-space: nowrap;
  }
  .contact .row{
    display: flex;
    justify-content: flex-end;
    gap: 6px;
  }
  .contact .label{
    color: var(--cyan);
    font-weight: 700;
  }

  .catalog{
    position: absolute;
    top: 0.2in;
    right: 0.3in;
    font-size: 6.5px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(0,126,143,0.45);
    z-index: 1;
  }

  @media print{
    body{ background: none; padding: 0; }
    .card{ box-shadow: none; }
  }
</style>
</head>
<body>

  <div class="card">
    <div class="frame"></div>
    <div class="amp-mark">[ ]</div>
    <div class="catalog">Sys&#8209;001</div>

    <div class="top">
      <div class="eyebrow">Software Engineering &amp; Systems</div>
      <div class="brand"><span class="bracket">[</span>Fish<span class="accent">Tank</span>Tech<span class="bracket">]</span></div>
      <div class="name">Fisher Armstrong</div>
      <div class="role">Web Platforms &amp;&amp; Data Engineering</div>
    </div>

    <div class="bottom">
      <div class="rule"></div>
      <div class="bottom-row">
        <div class="tagline">Development<br>Without Drowning.</div>
        <div class="contact">
          <div class="row"><span class="label">E</span><span>MyFishTankTech@gmail.com</span></div>
          <div class="row"><span class="label">GH</span><span>github.com/FishTankTech</span></div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
